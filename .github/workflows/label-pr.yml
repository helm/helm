name: Label PRs
on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, edited, synchronize]
permissions: {}
jobs:
  label:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # pin@v7.0.0
        with:
          sync-labels: true
