name: Label PRs
on:
  pull_request_target:
    types: [opened]
permissions: {}
jobs:
  label:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # pin@v6.2.0
        with:
          sync-labels: true
