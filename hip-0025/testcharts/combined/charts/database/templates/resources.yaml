apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-db-schema
  annotations:
    helm.sh/resource-group: schema
data:
  info: "Database schema migration - deploys first within database subchart"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-db-data
  annotations:
    helm.sh/resource-group: data
    helm.sh/depends-on/resource-groups: '["schema"]'
data:
  info: "Database seed data - deploys after schema within database subchart"
