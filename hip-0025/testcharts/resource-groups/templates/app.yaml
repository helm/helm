apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-app-config
  annotations:
    helm.sh/resource-group: app
    helm.sh/depends-on/resource-groups: '["database", "queue"]'
data:
  db_host: "localhost"
  queue_broker: "amqp://localhost"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
  annotations:
    helm.sh/resource-group: app
    helm.sh/depends-on/resource-groups: '["database", "queue"]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: myapp
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "echo 'app running' && sleep 3600"]
